name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: taoki-linux-x86_64
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: taoki-linux-aarch64
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: taoki-macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: taoki-macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: taoki-windows-x86_64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Sync plugin.json version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json, sys
          p = '.claude-plugin/plugin.json'
          d = json.load(open(p))
          d['version'] = sys.argv[1]
          json.dump(d, open(p, 'w'), indent=2)
          " "$VERSION"
        shell: bash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          mkdir -p staging/taoki/target/release
          cp target/${{ matrix.target }}/release/taoki staging/taoki/target/release/
          # Do NOT ship .mcp.json — plugin.json mcpServers is the single source of truth.
          # Shipping .mcp.json caused conflicts: project-level format (mcpServers wrapper,
          # relative paths) is incompatible with plugin context (needs ${CLAUDE_PLUGIN_ROOT}).
          cp -r .claude-plugin staging/taoki/
          cp -r commands staging/taoki/
          cp -r skills staging/taoki/
          cp -r hooks staging/taoki/
          test -d agents && cp -r agents staging/taoki/ || true
          mkdir -p staging/taoki/scripts
          cp scripts/run.sh staging/taoki/scripts/
          cp scripts/run.cmd staging/taoki/scripts/
          chmod +x staging/taoki/scripts/run.sh
          chmod +x staging/taoki/target/release/taoki
          chmod +x staging/taoki/hooks/*.sh
          cd staging
          tar czf ../${{ matrix.artifact }}.${{ matrix.ext }} taoki
        shell: bash

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        run: |
          mkdir -p staging/taoki/target/release
          cp target/${{ matrix.target }}/release/taoki.exe staging/taoki/target/release/
          # Update plugin.json to use run.cmd for Windows
          python3 -c "
          import json
          p = '.claude-plugin/plugin.json'
          d = json.load(open(p))
          d['mcpServers']['taoki']['command'] = '\${CLAUDE_PLUGIN_ROOT}/scripts/run.cmd'
          json.dump(d, open(p, 'w'), indent=2)
          "
          cp -r .claude-plugin staging/taoki/
          cp -r commands staging/taoki/
          cp -r skills staging/taoki/
          cp -r hooks staging/taoki/
          test -d agents && cp -r agents staging/taoki/ || true
          mkdir -p staging/taoki/scripts
          cp scripts/run.sh staging/taoki/scripts/
          cp scripts/run.cmd staging/taoki/scripts/
          cd staging
          7z a -tzip ../${{ matrix.artifact }}.${{ matrix.ext }} taoki
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
