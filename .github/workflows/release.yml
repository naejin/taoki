name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: taoki-linux-x86_64
            ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: taoki-linux-aarch64
            ext: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: taoki-macos-x86_64
            ext: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: taoki-macos-aarch64
            ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: taoki-windows-x86_64
            ext: zip

    steps:
      - uses: actions/checkout@v4

      - name: Sync plugin.json version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 -c "
          import json, sys
          p = '.claude-plugin/plugin.json'
          d = json.load(open(p))
          d['version'] = sys.argv[1]
          json.dump(d, open(p, 'w'), indent=2)
          " "$VERSION"
        shell: bash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (Unix)
        if: matrix.ext == 'tar.gz'
        run: |
          mkdir -p staging/taoki/target/release
          cp target/${{ matrix.target }}/release/taoki staging/taoki/target/release/
          # Do NOT ship .mcp.json — plugin.json mcpServers is the single source of truth.
          # Shipping .mcp.json caused conflicts: project-level format (mcpServers wrapper,
          # relative paths) is incompatible with plugin context (needs ${CLAUDE_PLUGIN_ROOT}).
          cp -r .claude-plugin staging/taoki/
          cp -r commands staging/taoki/
          cp -r skills staging/taoki/
          cp -r hooks staging/taoki/
          test -d agents && cp -r agents staging/taoki/ || true
          mkdir -p staging/taoki/scripts
          cp scripts/run.sh staging/taoki/scripts/
          cp scripts/run.cmd staging/taoki/scripts/
          cp scripts/taoki-gemini.md staging/taoki/scripts/
          cp scripts/taoki-opencode.md staging/taoki/scripts/
          chmod +x staging/taoki/scripts/run.sh
          chmod +x staging/taoki/target/release/taoki
          chmod +x staging/taoki/hooks/*.sh
          cd staging
          tar czf ../${{ matrix.artifact }}.${{ matrix.ext }} taoki
        shell: bash

      - name: Package (Windows)
        if: matrix.ext == 'zip'
        run: |
          mkdir -p staging/taoki/target/release
          cp target/${{ matrix.target }}/release/taoki.exe staging/taoki/target/release/
          # Update plugin.json to use run.cmd for Windows
          python3 -c "
          import json
          p = '.claude-plugin/plugin.json'
          d = json.load(open(p))
          d['mcpServers']['taoki']['command'] = '\${CLAUDE_PLUGIN_ROOT}/scripts/run.cmd'
          json.dump(d, open(p, 'w'), indent=2)
          "
          cp -r .claude-plugin staging/taoki/
          cp -r commands staging/taoki/
          cp -r skills staging/taoki/
          cp -r hooks staging/taoki/
          test -d agents && cp -r agents staging/taoki/ || true
          mkdir -p staging/taoki/scripts
          cp scripts/run.sh staging/taoki/scripts/
          cp scripts/run.cmd staging/taoki/scripts/
          cp scripts/taoki-gemini.md staging/taoki/scripts/
          cp scripts/taoki-opencode.md staging/taoki/scripts/
          cd staging
          7z a -tzip ../${{ matrix.artifact }}.${{ matrix.ext }} taoki
        shell: bash

      - name: Smoke test binary
        if: "!matrix.cross"
        run: |
          if [ "${{ matrix.ext }}" = "zip" ]; then
            BIN="target/${{ matrix.target }}/release/taoki.exe"
          else
            BIN="target/${{ matrix.target }}/release/taoki"
          fi
          VERSION="${GITHUB_REF_NAME#v}"

          # --version check
          BIN_VERSION=$("$BIN" --version 2>&1)
          if echo "$BIN_VERSION" | grep -q "$VERSION"; then
            echo "✓ Binary reports v${VERSION}"
          else
            echo "✗ Binary version '${BIN_VERSION}' doesn't match tag ${VERSION}"
            exit 1
          fi

          # MCP initialize + tools/list
          # No `timeout` — macOS lacks it. Pipe close (EOF) makes taoki exit.
          RESP=$(printf '%s\n%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-test","version":"1.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | "$BIN" 2>/dev/null || true)

          TOOLS=$(echo "$RESP" | python3 -c "
          import sys, json
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              try:
                  d = json.loads(line)
                  if d.get('id') == 2 and 'result' in d:
                      names = sorted(t['name'] for t in d['result']['tools'])
                      print(' '.join(names))
              except: pass
          " 2>/dev/null || true)

          if [ "$TOOLS" = "radar ripple xray" ]; then
            echo "✓ All 3 MCP tools registered"
          else
            echo "✗ Expected 'radar ripple xray', got '${TOOLS}'"
            exit 1
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.ext }}

  validate:
    name: Validate artifacts
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Validate artifact contents
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ERRORS=0

          REQUIRED_FILES=(
            "taoki/.claude-plugin/plugin.json"
            "taoki/commands/taoki-radar.md"
            "taoki/commands/taoki-ripple.md"
            "taoki/commands/taoki-xray.md"
            "taoki/skills/taoki-workflow.md"
            "taoki/hooks/hooks.json"
            "taoki/hooks/check-read.sh"
            "taoki/hooks/check-glob.sh"
            "taoki/hooks/check-agent.sh"
            "taoki/scripts/run.sh"
            "taoki/scripts/run.cmd"
            "taoki/scripts/taoki-gemini.md"
            "taoki/scripts/taoki-opencode.md"
          )

          for dir in artifacts/taoki-*/; do
            ARCHIVE=$(find "$dir" -type f \( -name '*.tar.gz' -o -name '*.zip' \) | head -1)
            NAME=$(basename "$ARCHIVE")
            echo "── Validating $NAME ──"

            TMPDIR=$(mktemp -d)
            if [[ "$ARCHIVE" == *.tar.gz ]]; then
              tar xzf "$ARCHIVE" -C "$TMPDIR"
              BINARY="$TMPDIR/taoki/target/release/taoki"
            else
              unzip -q "$ARCHIVE" -d "$TMPDIR"
              BINARY="$TMPDIR/taoki/target/release/taoki.exe"
            fi

            # Check required files
            for f in "${REQUIRED_FILES[@]}"; do
              if [ ! -f "$TMPDIR/$f" ]; then
                echo "  ✗ Missing: $f"
                ERRORS=$((ERRORS + 1))
              fi
            done

            # Check binary exists
            if [ ! -f "$BINARY" ]; then
              echo "  ✗ Missing binary"
              ERRORS=$((ERRORS + 1))
            else
              echo "  ✓ Binary present"
            fi

            # Check plugin.json version matches tag
            PV=$(python3 -c "import json; print(json.load(open('$TMPDIR/taoki/.claude-plugin/plugin.json'))['version'])")
            if [ "$PV" = "$VERSION" ]; then
              echo "  ✓ plugin.json version matches tag (v${VERSION})"
            else
              echo "  ✗ plugin.json version '${PV}' != tag '${VERSION}'"
              ERRORS=$((ERRORS + 1))
            fi

            # Check no .mcp.json leaked in
            if [ -f "$TMPDIR/taoki/.mcp.json" ]; then
              echo "  ✗ .mcp.json should not be in release artifacts"
              ERRORS=$((ERRORS + 1))
            fi

            rm -rf "$TMPDIR"
            echo "  ✓ All required files present"
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo ""
            echo "✗ ${ERRORS} validation error(s) -- aborting release"
            exit 1
          fi
          echo ""
          echo "✓ All artifacts validated"
        shell: bash

  release:
    name: Create Release
    needs: [build, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          cp scripts/install.sh release/install.sh
          cp scripts/install.ps1 release/install.ps1
          cp scripts/uninstall.sh release/uninstall.sh

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
